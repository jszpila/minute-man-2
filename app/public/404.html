<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minute Man</title>
    <script>
      try {
        sessionStorage.setItem(
          'minute-man:redirect',
          location.pathname + location.search + location.hash
        );
      } catch (error) {
        console.warn('Unable to store redirected route', error);
      }
      location.replace('/');
    </script>
  </head>
  <body>
    <noscript>Redirecting to Minute Man...</noscript>
  </body>
</html>
