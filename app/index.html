<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="preload" as="image" href="/assets/minman-v2-qr.png" />
    <link rel="manifest" href="/mainfest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1976d2" />
    <title>Minute Man</title>
    <script>
      (function () {
        try {
          var redirect = sessionStorage.getItem('minute-man:redirect');
          if (redirect) {
            sessionStorage.removeItem('minute-man:redirect');
            history.replaceState(null, '', redirect);
          }
        } catch (error) {
          console.warn('Unable to restore redirected route', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
